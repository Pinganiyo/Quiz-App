<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Interactivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">
        <!-- Pantalla de Carga -->
        <div id="loading" class="screen active">
            <div class="loader"></div>
            <p id="loading-text">Cargando...</p>
        </div>

        <!-- Pantalla de Selección -->
        <div id="selection-screen" class="screen">
            <h1>Exámenes Disponibles</h1>
            <p>Elige el examen que deseas realizar.</p>
            <div id="exams-list" style="display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 400px; margin: 0 auto;"></div>
        </div>

        <!-- Pantalla de Inicio -->
        <div id="start-screen" class="screen">
            <div style="width: 100%; display: flex; justify-content: flex-start; margin-bottom: 1rem;">
                <button id="back-to-selection-btn" class="btn secondary-btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; border: none;">&larr; Volver</button>
            </div>
            <h1 id="quiz-title">Título del Examen</h1>
            <p id="quiz-desc">Descripción del examen</p>
            <div class="test-info">
                <span class="info-badge" id="time-limit"></span>
                <span class="info-badge" id="pass-score"></span>
            </div>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; width: 100%;">
                <button id="start-btn" class="btn primary-btn">Comenzar Examen</button>
                <button id="study-btn" class="btn secondary-btn">Estudiar Respuestas</button>
            </div>
        </div>

        <!-- Pantalla de Estudio -->
        <div id="study-screen" class="screen">
            <h2 id="study-title">Guía de Estudio</h2>
            <div id="study-container" class="feedback-container" style="max-height: 55vh; overflow-y: auto; padding-right: 15px; width: 100%;"></div>
            <button id="back-to-start-btn" class="btn secondary-btn" style="margin-top: 2rem;">Volver al Inicio</button>
        </div>

        <!-- Pantalla del Examen -->
        <div id="exam-screen" class="screen">
            <div class="exam-header">
                <h2 id="exam-title-header">Examen en Curso</h2>
                <div class="exam-controls" style="display: flex; gap: 1rem; align-items: center;">
                    <button type="button" id="toggle-view-btn" class="btn secondary-btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Vista: Lista</button>
                    <div id="timer" class="timer">00:00</div>
                </div>
            </div>
            
            <div id="question-tracker" class="question-tracker" style="display: none;"></div>

            <form id="exam-form">
                <div id="questions-container"></div>
                
                <div id="pagination-controls" class="pagination-controls" style="display: none;">
                    <button type="button" id="prev-btn" class="btn secondary-btn">&larr; Anterior</button>
                    <button type="button" id="next-btn" class="btn primary-btn">Siguiente &rarr;</button>
                </div>

                <div class="exam-footer">
                    <button type="submit" id="submit-btn" class="btn primary-btn submit-btn">Validar y Finalizar</button>
                </div>
            </form>
        </div>

        <!-- Pantalla de Resultados -->
        <div id="result-screen" class="screen">
            <h2 id="result-title">Examen Completado</h2>
            <div class="score-card">
                <div class="score-circle">
                    <span id="score-text">0%</span>
                </div>
                <p id="result-msg" class="result-msg"></p>
            </div>
            <div id="feedback-container" class="feedback-container"></div>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; width: 100%;">
                <button id="retry-btn" class="btn primary-btn">Reintentar Examen</button>
                <button id="result-to-selection-btn" class="btn secondary-btn">Elegir Otro Examen</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
